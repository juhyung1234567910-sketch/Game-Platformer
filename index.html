<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web FPS - Step 1</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: white; font-family: sans-serif; font-size: 24px; text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>
    <div id="ui">HP: 100 | AMMO: 30</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // 1. 게임 상태 및 변수 초기화 (기존 파이썬 __init__ 역할)
        // ==========================================
        const gameState = {
            health: 100, max_health: 100,
            ammo: 30, max_ammo: 30,
            pos: new THREE.Vector3(0, 1, 5), // 시작 위치
            y_vel: 0,
            
            // 시점 및 마우스 관련
            yaw: 0, pitch: 0,
            sens: 0.002,
            target_sway_x: 0, target_sway_y: 0,
            sway_x: 0, sway_y: 0,
            
            // 카메라 관련
            camera_distance: 0, max_camera_distance: 10.0,
            is_first_person: true,
            is_aiming: false,
            is_reloading: false
        };

        // UI 업데이트 함수
        function updateHUD() {
            document.getElementById('ui').innerText = `HP: ${gameState.health} | AMMO: ${gameState.ammo}`;
        }

        // ==========================================
        // 2. Three.js 기본 씬 셋업
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6699CC); // 기존 glClearColor(0.4, 0.6, 0.9, 1.0)
        
        // 카메라 (기존 create_projection_matrix)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 400.0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 테스트용 바닥
        const gridHelper = new THREE.GridHelper(100, 100);
        scene.add(gridHelper);

        // ==========================================
        // 3. 마우스 & 키보드 컨트롤 (파이썬 pygame event 루프 번역)
        // ==========================================
        
        // 마우스 가두기 (pygame.event.set_grab)
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement !== document.body) return;

            // 기존: dx, dy = event.rel
            const dx = event.movementX;
            const dy = event.movementY;

            let current_sens = gameState.sens * (gameState.is_aiming ? 0.5 : 1.0);
            
            // yaw, pitch 계산 (파이썬 코드와 동일)
            gameState.yaw -= dx * current_sens;
            gameState.pitch -= dy * current_sens;
            
            // 피치 제한 (위아래 89도)
            const maxPitch = 89 * (Math.PI / 180);
            gameState.pitch = Math.max(-maxPitch, Math.min(maxPitch, gameState.pitch));

            // 총기 흔들림(Sway) 타겟값 업데이트
            gameState.target_sway_x = dx * 0.0005;
            gameState.target_sway_y = dy * 0.0005;
        });

        // 마우스 휠 (1인칭 / 3인칭 전환 로직 번역)
        document.addEventListener('wheel', (event) => {
            // event.deltaY가 파이썬의 event.y 방향과 반대일 수 있으므로 부호 조정
            gameState.camera_distance += (event.deltaY > 0 ? 0.5 : -0.5);
            gameState.camera_distance = Math.max(0.0, Math.min(gameState.camera_distance, gameState.max_camera_distance));
            gameState.is_first_person = gameState.camera_distance <= 0.5;
        });

        // 재장전 (R키)
        document.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'r') {
                if (gameState.ammo < gameState.max_ammo && !gameState.is_reloading) {
                    gameState.is_reloading = true;
                    // 웹에서는 프레임(60.0) 대신 setTimeout 등을 쓰거나, 업데이트 루프에서 시간을 뺌
                    setTimeout(() => {
                        gameState.ammo = gameState.max_ammo;
                        gameState.is_reloading = false;
                        updateHUD();
                    }, 1000); // 1초 뒤 장전 완료 (reload_duration 대용)
                }
            }
        });

        // ==========================================
        // 4. 사망 체크 & 서버 전송 로직 번역
        // ==========================================
        function checkDeath() {
            if (gameState.health <= 0 || gameState.pos.y <= -20.0) {
                console.log(`[💀] 사망 처리됨! (현재 HP: ${gameState.health}, Y좌표: ${gameState.pos.y.toFixed(1)})`);
                
                // 스탯 및 위치 초기화
                gameState.health = gameState.max_health;
                gameState.ammo = gameState.max_ammo;
                gameState.pos.set(0.0, 1.0, 5.0);
                gameState.y_vel = 0.0;
                updateHUD();

                // 웹소켓(서버) 전송용 데이터 (나중에 WebSocket 객체에 연결할 부분)
                const respawnMsg = {
                    type: "update",
                    pos: [gameState.pos.x, gameState.pos.y, gameState.pos.z],
                    health_reset: true
                };
                console.log("서버로 전송할 데이터:", JSON.stringify(respawnMsg));
                // sock.send(JSON.stringify(respawnMsg)); // 웹소켓 연결 후 주석 해제
            }
        }

        // ==========================================
        // 5. 메인 게임 루프 (파이썬 while True 번역)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            checkDeath();

            // --- 🎥 핵심 카메라 로직 번역 (머리 기준) ---
            const headHeight = 1.7;
            const slideDropCamera = 0.0; // 나중에 슬라이딩 변수 추가 시 구현
            
            // 1. 머리 위치 계산
            const headPos = gameState.pos.clone().add(new THREE.Vector3(0, headHeight + slideDropCamera, 0));
            // (view_bob_offset은 무기 그릴 때 같이 적용할 예정)

            // 2. 머리가 바라보는 방향 벡터 (Euler)
            const euler = new THREE.Euler(gameState.pitch, gameState.yaw, 0, 'YXZ');
            const front = new THREE.Vector3(0, 0, -1).applyEuler(euler);
            const right = new THREE.Vector3(1, 0, 0).applyEuler(euler);

            // 3. 1인칭 / 3인칭 카메라 배치
            if (gameState.is_first_person) {
                camera.position.copy(headPos);
            } else {
                const dist = gameState.camera_distance;
                const offsetFactor = Math.max(0, Math.min((dist - 0.5) / 2.0, 1.0));
                
                const leftOffset = right.clone().multiplyScalar(-0.8 * offsetFactor);
                const upOffset = new THREE.Vector3(0, 0.3 * offsetFactor, 0);
                
                // 카메라 위치 = 머리 - (앞*거리) - 왼쪽오프셋 + 위로오프셋
                const camPos = headPos.clone()
                    .sub(front.clone().multiplyScalar(dist))
                    .add(leftOffset)
                    .add(upOffset);
                
                camera.position.copy(camPos);
            }

            // 카메라가 바라볼 타겟 설정 (create_lookat_matrix 역할)
            const targetPos = headPos.clone().add(front.clone().multiplyScalar(100.0));
            camera.lookAt(targetPos);

            // (테스트용) y좌표 강제 하락시켜 낙사 테스트
            // gameState.pos.y -= 0.1;

            renderer.render(scene, camera);
        }

        // 창 크기 변경 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 실행
        animate();
    </script>
</body>
</html>
