<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOID PROTOCOL — Multiplayer FPS</title>

  <!-- importmap: "three" bare specifier → CDN URL로 매핑 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/": "https://cdn.jsdelivr.net/npm/three@0.158.0/"
    }
  }
  </script>

  <link rel="stylesheet" href="css/style.css" />
  <style>
    #lock-overlay { pointer-events: all !important; }
    #lock-btn {
      pointer-events: all !important;
      position: relative;
      z-index: 200;
      cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="canvas" tabindex="0"></canvas>
<div id="scanlines"></div>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"><div class="dot"></div></div>
  <div id="hitmarker"></div>
  <div id="ads-vignette"></div>
  <div id="damage-flash"></div>
  <div id="player-count">PLAYERS: 1</div>
  <div id="killfeed"></div>

  <div id="health-bar">
    <div id="health-label">HEALTH</div>
    <div id="health-track"><div id="health-fill"></div></div>
    <div id="health-num">100</div>
  </div>

  <div id="dash-cd">DASH READY</div>

  <div id="ammo-display">
    <div id="ammo-current">30</div>
    <div id="ammo-max">/ 30</div>
    <div id="ammo-mode">[AUTO]</div>
  </div>

  <div id="reload-bar">
    <div id="reload-label">RELOADING</div>
    <div id="reload-track"><div id="reload-fill"></div></div>
  </div>
</div>

<!-- 포인터 락 오버레이 -->
<div id="lock-overlay">
  <h1>VOID PROTOCOL</h1>
  <p>MULTIPLAYER · PARKOUR · FPS</p>
  <button id="lock-btn" type="button">[ ENTER ]</button>
  <p style="font-size:11px;opacity:0.35;letter-spacing:3px;margin-top:24px">
    WASD 이동 &nbsp;|&nbsp; SPACE 점프 &nbsp;|&nbsp; SHIFT 대시<br/><br/>
    우클릭 조준 &nbsp;|&nbsp; R 재장전 &nbsp;|&nbsp; M 사격모드 &nbsp;|&nbsp; 휠 줌
  </p>
</div>

<!-- 사망 화면 -->
<div id="death-screen">
  <h2>YOU DIED</h2>
  <p>RESPAWNING...</p>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
